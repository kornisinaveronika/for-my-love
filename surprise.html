<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Секретный сюрприз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffdce5 0%, #ffc0d0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            background: white;
            border-radius: 70px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 30px 40px rgba(231,84,128,0.3);
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .back-btn {
            display: inline-block;
            background: #ffb3c6;
            color: #a13e5c;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 40px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .envelope {
            font-size: 80px;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.3s;
        }

        .envelope:hover {
            transform: scale(1.1);
        }

        .surprise-message {
            display: none;
            margin-top: 25px;
            background: #fff0f5;
            border-radius: 40px;
            padding: 25px;
        }

        .surprise-message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .love-letter {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #a13e5c;
        }

        .signature {
            margin-top: 20px;
            font-style: italic;
            color: #e75480;
        }

        button {
            background: #ffb3c6;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #a13e5c;
            cursor: pointer;
            margin-top: 15px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        
        <h1 style="color:#e75480; margin-bottom:10px;">🎁 СЮРПРИЗ!</h1>
        <p style="color:#b96a85; margin-bottom:20px;">Нажми на конверт, чтобы открыть ❤️</p>

        <div class="envelope" id="envelope">
            💌
        </div>

        <div id="surpriseBox" class="surprise-message">
            <div class="love-letter">
                <p>✨ <strong>Мой любимый ✨</strong></p>
                <br>
                <p>Я тебя очень сильно люблю и готова каждый день проводить с тобой. Ты лучшее что случалось со мной в жизни❤️</p>
                <div class="signature">Твоя Зайка 💕</div>
            </div>
            <button onclick="document.getElementById('surpriseBox').classList.remove('show'); document.getElementById('envelope').innerHTML='💌'">
                Закрыть конверт
            </button>
        </div>

        <p style="margin-top: 30px; font-size:0.85rem; color:#d497af;">Я тебя очень сильно люблю! ❤️</p>
    </div>

    <script>
        document.getElementById('envelope').onclick = function() {
            document.getElementById('surpriseBox').classList.add('show');
            document.getElementById('envelope').innerHTML = '💖';
        }
    </script>
</body>
</html>
