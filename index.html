<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Для моего любимого</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffd9e4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 70px;
            padding: 50px 30px;
            box-shadow: 0 30px 40px rgba(231, 84, 128, 0.2);
            border: 1px solid white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .heart {
            font-size: 80px;
            animation: heartbeat 1.5s infinite;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #e75480;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #b96a85;
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-style: italic;
        }

        .name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff8cae;
            margin: 20px 0;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            background: #ffb3c6;
            color: #a13e5c;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 5px 0 #c97e9a;
            display: block;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #ffc0d0;
            box-shadow: 0 7px 0 #c97e9a;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #c97e9a;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #d497af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">❤️</div>
        <h1>Для моего любимого</h1>
        <div class="name">Серёжа</div>
        <div class="subtitle">Этот сайт создан с любовью только для тебя</div>

        <div class="menu">
            <a href="story.html" class="btn">📖 Наша история →</a>
            <a href="gallery.html" class="btn">📸 Галерея воспоминаний →</a>
            <a href="moments.html" class="btn">✨ Наши лучшие моменты →</a>
            <a href="surprise.html" class="btn">🎁 Секретный сюрприз →</a>
        </div>

        <footer>нажми на любую кнопку, чтобы продолжить путешествие ❤️</footer>
    </div>
</body>
</html>
