<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Наши моменты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #ffe4ec 100%);
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 50px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .back-btn {
            display: inline-block;
            background: #ffb3c6;
            color: #a13e5c;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 40px;
            margin-bottom: 30px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #ffc0d0;
            transform: translateX(-3px);
        }

        h1 {
            color: #e75480;
            text-align: center;
            margin-bottom: 30px;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #ffb3c6;
        }

        .moment {
            margin-bottom: 50px;
            position: relative;
            padding-left: 25px;
        }

        .moment::before {
            content: '❤️';
            position: absolute;
            left: -18px;
            top: 0;
            font-size: 20px;
        }

        .moment-date {
            color: #ff8cae;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .moment-title {
            font-size: 1.3rem;
            color: #b96a85;
            margin-bottom: 8px;
        }

        .moment-text {
            color: #6b3e4e;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* Стили для видео */
        .moment-video {
            margin-top: 15px;
            border-radius: 25px;
            overflow: hidden;
            background: #2d1b24;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .moment-video video {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }

        .video-caption {
            padding: 10px 15px;
            background: #fff0f5;
            color: #c97e9a;
            font-size: 0.85rem;
            text-align: center;
            font-style: italic;
        }

        .add-more {
            background: #fff0f5;
            padding: 20px;
            border-radius: 30px;
            margin-top: 20px;
            text-align: center;
            color: #c97e9a;
        }

        code {
            background: #ffd9e4;
            padding: 5px 10px;
            border-radius: 15px;
            display: inline-block;
            font-size: 0.8rem;
            text-align: left;
        }

        .instruction {
            margin-top: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        
        <h1>✨ Наши лучшие моменты</h1>

        <div class="timeline">
            
            <!-- МОМЕНТ 1: ДЕНЬ РОЖДЕНИЯ -->
            <div class="moment">
                <div class="moment-date">🎂 24.02.2026</div>
                <div class="moment-title">🎉 День рождения</div>
                <div class="moment-text">Это было самое лучшее моё день рождения</div>
                
                <!-- ВИДЕО ПРО ДЕНЬ РОЖДЕНИЯ -->
                <div class="moment-video">
                    <video controls preload="metadata">
                        <source src="videos\Др.MP4" type="video/mp4">
                        Ваш браузер не поддерживает видео
                    </video>
                    <div class="video-caption">📹 Видео с моего лучшего дня рождения ❤️</div>
                </div>
            </div>

            <!-- МОМЕНТ 2: ПРЕДЛОЖЕНИЕ -->
            <div class="moment">
                <div class="moment-date">🎄 01.01.2026</div>
                <div class="moment-title">❄️ Самый уютный вечер + 💍 ПРЕДЛОЖЕНИЕ!</div>
                <div class="moment-text">Тот самый день когда ты сделал мне предложение 💍❤️</div>
                
                <!-- ВИДЕО ПРО ПРЕДЛОЖЕНИЕ -->
                <div class="moment-video">
                    <video controls preload="metadata">
                        <source src="videos\Предложение.MP4" type="video/mp4">
                        Ваш браузер не поддерживает видео
                    </video>
                    <div class="video-caption">📹 Самое важное "ДА" в моей жизни 💍✨</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
